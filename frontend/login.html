<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thunderstone</title>
  <link rel="stylesheet" href="./style.css?v=6" />
</head>
<body>
  <div v-scope class="app">
    <main class="main" style="padding: 0;">
      <div class="login-container">
        <div class="login-header">
          <img src="./assets/raichu-logo.svg" alt="Raichu Logo" class="login-logo" style="width: 60px; height: auto; margin-bottom: 8px;">
          <h1 class="login-title">Raichu</h1>
          <p class="login-subtitle">Acesse sua conta para continuar</p>
        </div>

        <form class="login-form" @submit.prevent="fazerLogin">
          <div class="login-field">
            <label>E-mail corporativo</label>
            <div class="input-group">
              <svg class="input-icon-left" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
              <input type="email" v-model="email" placeholder="ex: raichu@gmail.com" required>
            </div>
          </div>

          <div class="login-field">
            <div class="input-group">
              <svg class="input-icon-left" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
              <input :type="showPassword ? 'text' : 'password'" v-model="password" placeholder="••••••••" required>

              <svg v-if="!showPassword" @click="togglePassword" class="input-icon-right" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="cursor: pointer;"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>

              <svg v-else @click="togglePassword" class="input-icon-right" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="cursor: pointer;"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>
            </div>
          </div>

          <div v-if="errorMessage" style="color: #ff4a4a; font-size: 12px; text-align: center; margin-bottom: -4px;">
            {{ errorMessage }}
          </div>

          <button type="submit" class="login-btn" :disabled="isLoading">
            {{ isLoading ? 'Entrando...' : 'Entrar' }}
          </button>

          <div class="login-divider"></div>

          <p class="login-footer">
            Ainda não tem uma conta? <a href="register.html">Cadastre-se agora</a>
          </p>
        </form>
      </div>
    </main>
  </div>

  <script type="module">
    import { createApp } from 'https://unpkg.com/petite-vue?module'
    const app = {
      email: '',
      password: '',
      errorMessage: '',
      isLoading: false,
      showPassword: false,
      togglePassword() {
        this.showPassword = !this.showPassword;
      },
      async fazerLogin() {
        this.errorMessage = '';
        this.isLoading = true;

        try {
          const body = new URLSearchParams();
          body.append('username', this.email);
          body.append('password', this.password);

          // URL do endpoint de login baseado na estrutura FastAPI original
          const response = await fetch('http://localhost:8000/auth/token', {
            method: 'POST',
            credentials: 'include',
            headers: {
              'Content-Type': 'application/x-www-form-urlencoded'
            },
            body: body
          });

          if (!response.ok) {
            const errorData = await response.json();
            this.errorMessage = errorData.detail || 'Erro ao realizar login. Tente novamente.';
            this.isLoading = false;
            return;
          }

          const next = new URLSearchParams(window.location.search).get('next');
          window.location.href = next || 'hello.html';
        } catch (error) {
          console.error(error);
          this.errorMessage = 'Erro de conexão. O servidor está rodando?';
        } finally {
          this.isLoading = false;
        }
      }
    }
    createApp(app).mount()
  </script>
</body>
</html>
