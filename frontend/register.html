<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thunderstone</title>
  <link rel="stylesheet" href="./style.css?v=7" />
</head>
<body>
  <div v-scope class="app">
    <div v-if="showSuccessModal" class="modal-backdrop">
      <div class="modal">
        <div class="modal-content">
          <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#DD7230" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom: 16px;">
            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
            <polyline points="22 4 12 14.01 9 11.01"></polyline>
          </svg>
          <h2 style="color: #DD7230; font-size: 24px; margin-bottom: 16px; font-weight: bold;">Sucesso!</h2>
          <p>Conta criada com sucesso! Você já pode fazer o Login.</p>
          <button @click="goToLogin" class="modal-btn">Voltar para login</button>
        </div>
      </div>
    </div>

    <main class="main" style="padding: 0;">
      <!-- TELA DE CADASTRO -->
      <div class="login-container" style="max-width: 480px; margin: 40px auto;">
        <div class="login-header" style="margin-bottom: 16px;">
          <img src="./assets/raichu-logo.svg" alt="Raichu Logo" class="login-logo" style="width: 50px; height: auto; margin-bottom: 8px;">
          <h1 class="login-title">Criar Conta</h1>
          <p class="login-subtitle">Junte-se ao Raichu e acesse a plataforma</p>
        </div>

        <form class="login-form" @submit.prevent="cadastrar">
          <div class="login-field">
            <label>Nome Completo</label>
            <div class="input-group">
              <svg class="input-icon-left" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
              <input type="text" v-model="username" placeholder="Nome e Sobrenome" required>
            </div>
          </div>

          <div style="display: flex; gap: 16px;">
            <div class="login-field" style="flex: 1;">
              <label>E-mail corporativo</label>
              <div class="input-group">
                <svg class="input-icon-left" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
                <input type="email" v-model="email" placeholder="ex@email.com" required>
              </div>
            </div>

            <div class="login-field" style="flex: 1;">
              <label>Confirmação de E-mail</label>
              <div class="input-group">
                <svg class="input-icon-left" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
                <input type="email" v-model="confirmEmail" placeholder="Confirme seu e-mail" required>
              </div>
            </div>
          </div>

          <div style="display: flex; gap: 16px;">
            <div class="login-field" style="flex: 1;">
              <label>Senha</label>
              <div class="input-group">
                <svg class="input-icon-left" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                <input :type="showPassword ? 'text' : 'password'" v-model="password" placeholder="••••••••" required>
                <!-- Mostrar / Ocultar Senha -->
                <svg v-if="!showPassword" @click="togglePassword" class="input-icon-right" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="cursor: pointer;"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                <svg v-else @click="togglePassword" class="input-icon-right" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="cursor: pointer;"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>
              </div>
            </div>

            <div class="login-field" style="flex: 1;">
              <label>Confirmação de Senha</label>
              <div class="input-group">
                <svg class="input-icon-left" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                <input :type="showConfirmPassword ? 'text' : 'password'" v-model="confirmPassword" placeholder="••••••••" required>
                <!-- Mostrar / Ocultar Confirmação -->
                <svg v-if="!showConfirmPassword" @click="toggleConfirmPassword" class="input-icon-right" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="cursor: pointer;"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                <svg v-else @click="toggleConfirmPassword" class="input-icon-right" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="cursor: pointer;"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>
              </div>
            </div>
          </div>

          <div v-if="errorMessage" style="color: #ff4a4a; font-size: 12px; text-align: center; margin-bottom: -4px;">
            {{ errorMessage }}
          </div>

          <button type="submit" class="login-btn" :disabled="isLoading" style="margin-top: 10px;">
            {{ isLoading ? 'Cadastrando...' : 'Cadastrar' }}
          </button>

          <div class="login-divider"></div>

          <p class="login-footer">
            Já possui uma conta? <a href="login.html">Volte para o Login</a>
          </p>
        </form>
      </div>
    </main>
  </div>

  <script type="module">
    import { createApp } from 'https://unpkg.com/petite-vue?module'
    const app = {
      username: '',
      email: '',
      confirmEmail: '',
      password: '',
      confirmPassword: '',
      errorMessage: '',
      isLoading: false,
      showPassword: false,
      showConfirmPassword: false,
      showSuccessModal: false,

      togglePassword() {
        this.showPassword = !this.showPassword;
      },
      toggleConfirmPassword() {
        this.showConfirmPassword = !this.showConfirmPassword;
      },
      goToLogin() {
        window.location.href = 'login.html';
      },

      async cadastrar() {
        this.errorMessage = '';

        // Validações no frontend
        if (this.email !== this.confirmEmail) {
          this.errorMessage = 'Os endereços de e-mail não conferem.';
          return;
        }
        if (this.password !== this.confirmPassword) {
          this.errorMessage = 'As senhas não conferem.';
          return;
        }
        if (this.password.length < 6) {
          this.errorMessage = 'A senha deve ter no mínimo 6 caracteres.';
          return;
        }

        this.isLoading = true;

        try {
          const res = await fetch('http://localhost:8000/users/', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({
              username: this.username,
              email: this.email,
              password: this.password
            })
          });

          if (!res.ok) {
            const errorData = await res.json();
            // Pega o detalhe da resposta, ex: "Email already exists"
            this.errorMessage = errorData.detail || 'Erro ao realizar cadastro. Verifique os dados.';
            this.isLoading = false;
            return;
          }

          this.showSuccessModal = true;
        } catch (error) {
          console.error(error);
          this.errorMessage = 'Erro de conexão. Tente novamente mais tarde';
        } finally {
          this.isLoading = false;
        }
      }
    }
    createApp(app).mount()
  </script>
</body>
</html>
